<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impara - Universal 80/20 & Custom Translator</title>
    <script src="https://cdn.jsdelivr.net/npm/lucide-static@0.344.0/font/lucide.min.js"></script>
    <style>
        :root {
            --bg-primary: #121214;
            --bg-surface: #1a1a1e;
            --bg-card: #26262b;
            --accent: #00cdb4;
            --accent-dim: rgba(0, 205, 180, 0.15);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border: #374151;
        }

        * {
            box-sizing: border-box;
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background-color: var(--bg-surface);
            padding: 16px;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }

        .lang-control-row {
            margin-top: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        select.lang-dropdown, .btn-action {
            background-color: var(--bg-card);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 0.9rem;
            outline: none;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-action {
            background-color: var(--accent-dim);
            color: var(--accent);
            border-color: var(--accent);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Dynamic Modal / Creator Panel */
        .creator-panel {
            display: none;
            background-color: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            margin: 10px auto;
            max-width: 400px;
            flex-direction: column;
            gap: 10px;
            text-align: left;
        }

        .creator-panel.active { display: flex; }

        .creator-panel input {
            background-color: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 8px;
            border-radius: 6px;
            outline: none;
        }

        .app-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            padding-bottom: 90px;
        }

        .view-section { display: none; }
        .view-section.active { display: block; }

        .chip-container {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 12px;
            margin-bottom: 16px;
            scrollbar-width: none;
        }
        .chip-container::-webkit-scrollbar { display: none; }

        .chip {
            background-color: var(--bg-card);
            color: var(--text-muted);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            white-space: nowrap;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .chip.active {
            background-color: var(--accent-dim);
            color: var(--accent);
            border-color: var(--accent);
            font-weight: 600;
        }

        .vocab-grid { display: flex; flex-direction: column; gap: 12px; }

        .vocab-card {
            background-color: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .vocab-info h3 { font-size: 1.15rem; font-weight: 600; }
        .vocab-info p { font-size: 0.9rem; color: var(--text-muted); margin-top: 4px; }

        .audio-actions { display: flex; gap: 8px; }

        .btn-audio {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-main);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.25rem;
        }

        .translator-box {
            background-color: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .mode-selector {
            display: flex;
            background-color: var(--bg-card);
            padding: 4px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .mode-btn {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 12px;
            font-size: 0.85rem;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
        }

        .mode-btn.active {
            background-color: var(--bg-primary);
            color: var(--accent);
        }

        .stream-display, .translation-output {
            min-height: 90px;
            background-color: var(--bg-primary);
            border-radius: 12px;
            padding: 14px;
            border: 1px solid var(--border);
            font-size: 1.05rem;
            line-height: 1.5;
        }

        .translation-output {
            color: var(--accent);
            background-color: rgba(0, 205, 180, 0.02);
            border: 1px dashed var(--border);
        }

        .mic-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
        }

        .btn-mic {
            width: 76px;
            height: 76px;
            border-radius: 50%;
            background-color: var(--bg-card);
            border: 2px solid var(--border);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            outline: none;
        }

        .btn-mic.listening {
            background-color: #ef4444;
            border-color: #ef4444;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.4);
            animation: pulse 1.4s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.04); }
            100% { transform: scale(1); }
        }

        nav.tab-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 70px;
            background-color: var(--bg-surface);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-muted);
            background: none;
            border: none;
            cursor: pointer;
            gap: 4px;
            font-size: 0.75rem;
            width: 50%;
        }

        .tab-item.active { color: var(--accent); }
    </style>
</head>
<body>

    <header>
        <h1>Impara Matrix</h1>
        <div class="lang-control-row">
            <select id="lang-select" class="lang-dropdown" onchange="handleLanguageChange()">
                <option value="it">🇮🇹 Italiano (Italian)</option>
                <option value="pt">🇧🇷 Português (Brazilian)</option>
                <option value="hu">🇭🇺 Magyar (Hungarian)</option>
                <option value="es">🇪🇸 Español (Spanish)</option>
                <option value="fr">🇫🇷 Français (French)</option>
                <option value="de">🇩🇪 Deutsch (German)</option>
                <option value="ja">🇯🇵 日本語 (Japanese)</option>
                <option value="zh">🇨🇳 中文 (Chinese)</option>
            </select>
            <button class="btn-action" onclick="toggleCreatorPanel()"><i class="lucide-plus" style="font-size: 14px"></i> Custom</button>
        </div>

        <!-- Hidden Injector Matrix Block -->
        <div id="creator-panel" class="creator-panel">
            <h4 style="font-size:0.9rem; margin-bottom:4px;">Add Custom Language Matrix</h4>
            <input type="text" id="new-lang-name" placeholder="Language Name (e.g. Greek)">
            <input type="text" id="new-lang-flag" placeholder="Flag Emoji (e.g. 🇬🇷)">
            <input type="text" id="new-lang-locale" placeholder="Locale Code (e.g. el-GR)">
            <button class="btn-action" style="background-color:var(--accent); color:#121214; justify-content:center;" onclick="createNewLanguage()">Save to Engine</button>
        </div>
    </header>

    <div class="app-container">
        <!-- 80/20 VOCABULARY VIEW -->
        <section id="vocab-view" class="view-section active">
            <div class="chip-container">
                <div class="chip active" onclick="filterVocab('all', this)">All</div>
                <div class="chip" onclick="filterVocab('essentials', this)">Essentials</div>
                <div class="chip" onclick="filterVocab('greetings', this)">Greetings</div>
                <div class="chip" onclick="filterVocab('small-talk', this)">Small Talk</div>
            </div>
            <div class="vocab-grid" id="vocab-list"></div>
        </section>

        <!-- LIVE INTERACTIVE MIC TRANSLATOR -->
        <section id="translate-view" class="view-section">
            <div class="translator-box">
                <div class="mode-selector">
                    <button class="mode-btn active" id="btn-mode-tgt-en" onclick="setTranslationMode('tgt-en')">THEIR LANGUAGE → EN</button>
                    <button class="mode-btn" id="btn-mode-en-tgt" onclick="setTranslationMode('en-tgt')">MY ENGLISH → THEM</button>
                </div>
                
                <div>
                    <span style="font-size: 0.75rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase;" id="speech-label">Spoken Audio Input:</span>
                    <div class="stream-display" id="speech-input-display">Tap mic below and speak...</div>
                </div>

                <div>
                    <span style="font-size: 0.75rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase;">Translated Output (Auto-Speaks):</span>
                    <div class="translation-output" id="translation-output-display">Translation will print & speak...</div>
                </div>

                <div class="mic-container">
                    <button class="btn-mic" id="mic-trigger" onclick="toggleListening()">
                        <i class="lucide-mic" style="font-size: 30px;"></i>
                    </button>
                    <span style="font-size: 0.85rem; color: var(--text-muted); font-weight: 500;" id="mic-status-text">Microphone Ready</span>
                </div>
            </div>
        </section>
    </div>

    <nav class="tab-bar">
        <button class="tab-item active" onclick="switchView('vocab', this)">
            <i class="lucide-book-open" style="font-size: 20px;"></i><span>80/20 Lexicon</span>
        </button>
        <button class="tab-item" onclick="switchView('translate', this)">
            <i class="lucide-mic" style="font-size: 20px;"></i><span>Live Session</span>
        </button>
    </nav>

    <script>
        // Core Languages Base Map Array Matrix
        let baseLanguageMatrix = {
            it: {
                name: "Italian", locale: "it-IT", flag: "🇮🇹",
                vocab: [
                    { it: "Sì", en: "Yes", cat: "essentials" }, { it: "No", en: "No", cat: "essentials" },
                    { it: "Per favore", en: "Please", cat: "essentials" }, { it: "Grazie mille", en: "Thank you very much", cat: "essentials" },
                    { it: "Ciao", en: "Hello / Goodbye", cat: "greetings" }, { it: "Buongiorno", en: "Good morning", cat: "greetings" },
                    { it: "Come stai?", en: "How are you?", cat: "small-talk" }, { it: "Mi chiamo...", en: "My name is...", cat: "small-talk" }
                ]
            },
            pt: {
                name: "Brazilian Portuguese", locale: "pt-BR", flag: "🇧🇷",
                vocab: [
                    { it: "Sim", en: "Yes", cat: "essentials" }, { it: "Não", en: "No", cat: "essentials" },
                    { it: "Por favor", en: "Please", cat: "essentials" }, { it: "Muito obrigado", en: "Thank you very much", cat: "essentials" },
                    { it: "Olá / Oi", en: "Hello / Hi", cat: "greetings" }, { it: "Bom dia", en: "Good morning", cat: "greetings" },
                    { it: "Tudo bem?", en: "How are you?", cat: "small-talk" }, { it: "Meu nome é...", en: "My name is...", cat: "small-talk" }
                ]
            },
            hu: {
                name: "Hungarian", locale: "hu-HU", flag: "🇭🇺",
                vocab: [
                    { it: "Igen", en: "Yes", cat: "essentials" }, { it: "Nem", en: "No", cat: "essentials" },
                    { it: "Kérem", en: "Please", cat: "essentials" }, { it: "Köszönöm szépen", en: "Thank you very much", cat: "essentials" },
                    { it: "Szia", en: "Hello / Hi", cat: "greetings" }, { it: "Jó reggelt", en: "Good morning", cat: "greetings" },
                    { it: "Hogy vagy?", en: "How are you?", cat: "small-talk" }, { it: "A nevem...", en: "My name is...", cat: "small-talk" }
                ]
            },
            es: {
                name: "Spanish", locale: "es-ES", flag: "编🇪🇸",
                vocab: [
                    { it: "Sí", en: "Yes", cat: "essentials" }, { it: "No", en: "No", cat: "essentials" },
                    { it: "Por favor", en: "Please", cat: "essentials" }, { it: "Muchas gracias", en: "Thank you very much", cat: "essentials" },
                    { it: "Hola", en: "Hello", cat: "greetings" }, { it: "Buenos días", en: "Good morning", cat: "greetings" },
                    { it: "¿Cómo estás?", en: "How are you?", cat: "small-talk" }, { it: "Me llamo...", en: "My name is...", cat: "small-talk" }
                ]
            },
            fr: {
                name: "French", locale: "fr-FR", flag: "🇫🇷",
                vocab: [
                    { it: "Oui", en: "Yes", cat: "essentials" }, { it: "Non", en: "No", cat: "essentials" },
                    { it: "S'il vous plaît", en: "Please", cat: "essentials" }, { it: "Merci beaucoup", en: "Thank you very much", cat: "essentials" },
                    { it: "Salut", en: "Hi / Bye", cat: "greetings" }, { it: "Bonjour", en: "Hello / Good morning", cat: "greetings" },
                    { it: "Comment ça va?", en: "How are things?", cat: "small-talk" }, { it: "Je m'appelle...", en: "My name is...", cat: "small-talk" }
                ]
            },
            de: {
                name: "German", locale: "de-DE", flag: "🇩🇪",
                vocab: [
                    { it: "Ja", en: "Yes", cat: "essentials" }, { it: "Nein", en: "No", cat: "essentials" },
                    { it: "Bitte", en: "Please", cat: "essentials" }, { it: "Danke schön", en: "Thank you very much", cat: "essentials" },
                    { it: "Hallo", en: "Hello", cat: "greetings" }, { it: "Guten Morgen", en: "Good morning", cat: "greetings" },
                    { it: "Wie geht es dir?", en: "How are you?", cat: "small-talk" }, { it: "Ich heiße...", en: "My name is...", cat: "small-talk" }
                ]
            },
            ja: {
                name: "Japanese", locale: "ja-JP", flag: "🇯🇵",
                vocab: [
                    { it: "はい (Hai)", en: "Yes", cat: "essentials" }, { it: "いいえ (Iie)", en: "No", cat: "essentials" },
                    { it: "お願いします (Onegai shimasu)", en: "Please", cat: "essentials" }, { it: "ありがとうございます (Arigatou gozaimasu)", en: "Thank you very much", cat: "essentials" },
                    { it: "こんにちは (Konnichiwa)", en: "Hello", cat: "greetings" }, { it: "おはようございます (Ohayou gozaimasu)", en: "Good morning", cat: "greetings" },
                    { it: "お元気ですか (O-genki desu ka?)", en: "How are you?", cat: "small-talk" }, { it: "私の名前は... (Watashi no namae wa...)", en: "My name is...", cat: "small-talk" }
                ]
            },
            zh: {
                name: "Chinese", locale: "zh-CN", flag: "🇨🇳",
                vocab: [
                    { it: "是的 (Shì de)", en: "Yes", cat: "essentials" }, { it: "不是 (Bú shì)", en: "No", cat: "essentials" },
                    { it: "请 (Qǐng)", en: "Please", cat: "essentials" }, { it: "非常感谢 (Fēicháng xièxiè)", en: "Thank you very much", cat: "essentials" },
                    { it: "你好 (Nǐ hǎo)", en: "Hello", cat: "greetings" }, { it: "早上好 (Zǎoshang hǎo)", en: "Good morning", cat: "greetings" },
                    { it: "你好吗？ (Nǐ hǎo ma?)", en: "How are you?", cat: "small-talk" }, { it: "我叫... (Wǒ jiào...)", en: "My name is...", cat: "small-talk" }
                ]
            }
        };

        let languageData = {};
        let currentLang = 'it';
        let translationDirection = 'tgt-en'; 
        let recognition = null;
        let isListening = false;

        document.addEventListener('DOMContentLoaded', () => {
            loadLanguagesEngine();
            updateLanguageInterface();
            initSpeechRecognition();
        });

        // Pull core list mixed with custom configurations out of Local Storage context
        function loadLanguagesEngine() {
            const stored = localStorage.getItem('custom_impara_matrix');
            if (stored) {
                languageData = JSON.parse(stored);
                // Update selector drop-down to print user inclusions
                const selector = document.getElementById('lang-select');
                selector.innerHTML = '';
                Object.keys(languageData).forEach(key => {
                    const opt = document.createElement('option');
                    opt.value = key;
                    opt.innerText = `${languageData[key].flag} ${languageData[key].name}`;
                    selector.appendChild(opt);
                });
            } else {
                languageData = baseLanguageMatrix;
                localStorage.setItem('custom_impara_matrix', JSON.stringify(languageData));
            }
        }

        function toggleCreatorPanel() {
            document.getElementById('creator-panel').classList.toggle('active');
        }

        function createNewLanguage() {
            const name = document.getElementById('new-lang-name').value.trim();
            const flag = document.getElementById('new-lang-flag').value.trim() || "🏳️";
            const locale = document.getElementById('new-lang-locale').value.trim() || "en-US";
            
            if(!name) { alert("Please provide a language title identifier."); return; }
            
            const key = name.toLowerCase().substring(0, 3);
            
            // Build dynamic high-yield template base structures
            languageData[key] = {
                name: name,
                locale: locale,
                flag: flag,
                vocab: [
                    { it: "[Custom Key 1]", en: "Yes", cat: "essentials" },
                    { it: "[Custom Key 2]", en: "No", cat: "essentials" },
                    { it: "[Custom Key 3]", en: "Hello", cat: "greetings" },
                    { it: "[Custom Key 4]", en: "How are you?", cat: "small-talk" }
                ]
            };

            localStorage.setItem('custom_impara_matrix', JSON.stringify(languageData));
            loadLanguagesEngine();
            document.getElementById('lang-select').value = key;
            handleLanguageChange();
            toggleCreatorPanel();
            
            alert(`${name} has been added successfully! You can directly edit its dynamic translation files or vocabulary strings inside the local browser database.`);
        }

        function handleLanguageChange() {
            currentLang = document.getElementById('lang-select').value;
            updateLanguageInterface();
            if(isListening) toggleListening();
        }

        function updateLanguageInterface() {
            const currentConfig = languageData[currentLang];
            document.getElementById('btn-mode-tgt-en').innerText = `${currentConfig.flag} ${currentConfig.name.toUpperCase()} → 🇺🇸 EN`;
            document.getElementById('btn-mode-en-tgt').innerText = `🇺🇸 EN → ${currentConfig.flag} ${currentConfig.name.toUpperCase()}`;
            renderVocabulary('all');
        }

        function renderVocabulary(category) {
            const container = document.getElementById('vocab-list');
            container.innerHTML = '';
            const activeList = languageData[currentLang].vocab;
            const targetFlag = languageData[currentLang].flag;
            const filtered = category === 'all' ? activeList : activeList.filter(item => item.cat === category);
            
            filtered.forEach(item => {
                const card = document.createElement('div');
                card.className = 'vocab-card';
                card.innerHTML = `
                    <div class="vocab-info">
                        <h3>${item.it}</h3>
                        <p>${item.en}</p>
                    </div>
                    <div class="audio-actions">
                        <button class="btn-audio" onclick="speak('${item.en}', 'en-US')" title="Speak English">🇺🇸</button>
                        <button class="btn-audio" onclick="speak('${item.it}', '${languageData[currentLang].locale}')" title="Speak Target">${targetFlag}</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function filterVocab(category, chipElement) {
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            chipElement.classList.add('active');
            renderVocabulary(category);
        }

        function speak(text, locale) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const cleanText = text.replace(/\([^)]*\)/g, "");
                const utterance = new SpeechSynthesisUtterance(cleanText);
                utterance.lang = locale;
                utterance.rate = 0.9;
                window.speechSynthesis.speak(utterance);
            }
        }

        function switchView(view, tabElement) {
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            tabElement.classList.add('active');
            document.getElementById(`${view}-view`).classList.add('active');
            if(isListening) toggleListening();
        }

        function setTranslationMode(mode) {
            translationDirection = mode;
            document.getElementById('btn-mode-tgt-en').classList.toggle('active', mode === 'tgt-en');
            document.getElementById('btn-mode-en-tgt').classList.toggle('active', mode === 'en-tgt');
            
            document.getElementById('speech-label').innerText = mode === 'tgt-en' ? "Their Spoken Audio Input:" : "My Spoken English Input:";
            document.getElementById('speech-input-display').innerText = "Tap mic to start...";
            document.getElementById('translation-output-display').innerText = "Translation output...";
            if(isListening) { toggleListening(); toggleListening(); }
        }

        function initSpeechRecognition() {
            window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (window.SpeechRecognition) {
                recognition = new SpeechRecognition();
                recognition.continuous = false;
                recognition.interimResults = false;

                recognition.onstart = () => {
                    isListening = true;
                    document.getElementById('mic-trigger').classList.add('listening');
                    document.getElementById('mic-status-text').innerText = "Recording... Speak now.";
                };

                recognition.onresult = async (event) => {
                    const resultText = event.results[0][0].transcript;
                    document.getElementById('speech-input-display').innerText = resultText;
                    await processLiveTranslation(resultText);
                };

                recognition.onerror = (e) => {
                    document.getElementById('mic-status-text').innerText = `Status Error: Check mic permissions or HTTPS context.`;
                    stopMicUI();
                };

                recognition.onend = () => { stopMicUI(); };
            } else {
                document.getElementById('mic-status-text').innerText = "Speech input API unsupported on this browser version.";
            }
        }

        function stopMicUI() {
            isListening = false;
            document.getElementById('mic-trigger').classList.remove('listening');
            document.getElementById('mic-status-text').innerText = "Microphone Ready";
        }

        function toggleListening() {
            if (!recognition) return;
            if (isListening) {
                recognition.stop();
            } else {
                recognition.lang = translationDirection === 'tgt-en' ? languageData[currentLang].locale : 'en-US';
                recognition.start();
            }
        }

        async function processLiveTranslation(text) {
            const outputElement = document.getElementById('translation-output-display');
            outputElement.innerText = "Processing live network conversion...";

            const sourceLang = translationDirection === 'tgt-en' ? currentLang : 'en';
            const targetLang = translationDirection === 'tgt-en' ? 'en' : currentLang;

            try {
                const response = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${sourceLang}|${targetLang}`);
                const data = await response.json();
                
                if(data && data.responseData) {
                    const translation = data.responseData.translatedText;
                    outputElement.innerText = translation;
                    
                    const outputLocale = translationDirection === 'tgt-en' ? 'en-US' : languageData[currentLang].locale;
                    speak(translation, outputLocale);
                } else {
                    outputElement.innerText = "Translation lookup failure.";
                }
            } catch (error) {
                outputElement.innerText = "Network engine bottleneck. Using matching parameters...";
            }
        }
    </script>
</body>
